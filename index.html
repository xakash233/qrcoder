<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Motherly App</title>
  <script>
    (function redirectToStore() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const playStoreUrl = "https://play.google.com/store/apps/details?id=com.mothrly";
      const appStoreUrl = "https://apps.apple.com/in/app/motherly-your-birth-companion/id6746041100";
      const fallbackUrl = "https://github.com/xakash233/qrcoder";

      const isAndroid = /android/i.test(userAgent);
      const isIOS =
        /iPad|iPhone|iPod/.test(userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isAndroid) {
        window.location.replace(playStoreUrl);
        return;
      }

      if (isIOS) {
        window.location.replace(appStoreUrl);
        return;
      }

      window.location.replace(fallbackUrl);
    })();
  </script>
</head>
<body>
  Redirecting to the right app store...
</body>
</html>
